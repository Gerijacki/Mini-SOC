name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.4
      - run: ruff check . --line-length 120

  test-detection:
    name: Tests — detection-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: detection-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: detection-api/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ --tb=short -q --color=yes

  test-generator:
    name: Tests — log-generator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: log-generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: log-generator/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ --tb=short -q --color=yes

  test-response:
    name: Tests — response-system
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: response-system
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: response-system/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ --tb=short -q --color=yes

  build-images:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [detection-api, log-generator, response-system, rag-enricher]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
